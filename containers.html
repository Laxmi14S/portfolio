<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #parent{
            height:800px;
            border:2px solid black;
            display:flex;
            justify-content: space-evenly;
            align-items: center;
            background-image: url("https://upload.wikimedia.org/wikipedia/commons/9/91/Stranger_Things_Logo_UBX.jpg");
            background-repeat: no-repeat;
            background-size: cover;
        }
        #child1{
            height:400px;
            width:400px;
        }
        #child2{
            height:400px;
            width:400px;
        }
        #child3{
            height:400px;
            width:400px;
        }
        img{
            height:400px;
            width:400px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="parent">
        <div id="child1">
            <img src="https://wallpapers-clan.com/wp-content/uploads/2025/12/stranger-things-5-will-byers-pfp-02.jpg" 
            alt="will"/>
        </div>
        <div id="child2">
            <img src="https://images5.alphacoders.com/140/1403087.jpg" alt="el" 
             />
        </div>
        <div id="child3">
            <img src="https://images6.alphacoders.com/140/thumb-1920-1403088.jpg" alt="mike"/>
        </div>
    </div>
</body>
</html>
