<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>

<style>
body{
    margin: 0;
    font-family:Arial, Helvetica, sans-serif;
}

#signupform{
    border: 2px solid rgb(116, 70, 30);
    height:100vh;
    width: 100vw;
    background-image: url(./backgorund.jpg); 
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
}

#signup{
    border:2px solid blanchedalmond;
    height:500px;
    width: 400px;           
    padding: 10px;           
    border-radius: 8px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    border-radius: 15px;

    color: white;
    font-size: 16px;          

    display: flex;
    flex-direction: column;
}

.form-group{
    display: flex;
    flex-direction: column;
    margin-bottom: 15px;
}

.form-group label{
    margin-bottom: 5px;
}

.form-group input{
    width: 90%;            
    padding: 10px;
    border: none;
    border-radius: 8px;
    outline: none;
}

#button{
    height:100px;
    width: 900%;           
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 8px;
    background-color:#BFA28C;
    color: rgba(255,255,255,0.2);
    font-size: 25px;
}

</style>

</head>

<body>
<div id="signupform">
    <div id="signup">

        <h2>SIGNUP FORM</h2>

        <div class="form-group">
            <label>Name</label>
            <input type="text" placeholder="Good Name">
        </div>
        <br/>
        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Email">
        </div>
        <br/>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="Phone Number">
        </div>
        <br/>
        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Password">
        </div>
        <br/>
        <button>Sign Up</button>

    </div>
</div>

</body>
</html>
