<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
        }
        .atm-machine {
            background: #2c3e50;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 350px;
            color: white;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .screen {
            background: #1a1a1a;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            min-height: 60px;
            font-size: 14px;
            word-wrap: break-word;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #2980b9;
        }
        .info {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>
    <div class="atm-machine">
        <h1>💳 ATM</h1>
        <div class="screen" id="screen">Welcome to ATM</div>
        
        <input type="password" id="pin" placeholder="Enter PIN" style="display:none;">
        <input type="number" id="amount" placeholder="Enter Amount" style="display:none;">
        
        <button onclick="startATM()" id="startBtn">Start</button>
        <button onclick="authenticate()" id="authBtn" style="display:none;">Login</button>
        <button onclick="checkBalance()" id="balanceBtn" style="display:none;">Check Balance</button>
        <button onclick="withdraw()" id="withdrawBtn" style="display:none;">Withdraw</button>
        <button onclick="deposit()" id="depositBtn" style="display:none;">Deposit</button>
        <button onclick="exitATM()" id="exitBtn" style="display:none;">Exit</button>
        
        <div class="info">Demo PIN: 1234</div>
    </div>

    <script>
        let userBalance = 5000;
        const correctPIN = "1234";
        let isAuthenticated = false;

        function updateScreen(message) {
            document.getElementById("screen").textContent = message;
        }

        function startATM() {
            document.getElementById("startBtn").style.display = "none";
            document.getElementById("pin").style.display = "block";
            document.getElementById("authBtn").style.display = "block";
            updateScreen("Enter your PIN");
        }

        function authenticate() {
            const pin = document.getElementById("pin").value;
            if (pin === correctPIN) {
                isAuthenticated = true;
                showMenu();
                updateScreen("Authentication successful!");
            } else {
                updateScreen("Invalid PIN. Try again.");
                document.getElementById("pin").value = "";
            }
        }

        function showMenu() {
            document.getElementById("pin").style.display = "none";
            document.getElementById("authBtn").style.display = "none";
            document.getElementById("amount").style.display = "none";
            document.getElementById("balanceBtn").style.display = "block";
            document.getElementById("withdrawBtn").style.display = "block";
            document.getElementById("depositBtn").style.display = "block";
            document.getElementById("exitBtn").style.display = "block";
            updateScreen("Select an option");
        }

        function checkBalance() {
            updateScreen(`Your balance: $${userBalance}`);
        }

        function withdraw() {
            document.getElementById("amount").style.display = "block";
            document.getElementById("amount").placeholder = "Enter amount to withdraw";
            document.getElementById("withdrawBtn").textContent = "Confirm Withdraw";
            document.getElementById("withdrawBtn").onclick = function() {
                const amount = parseInt(document.getElementById("amount").value);
                if (amount > 0 && amount <= userBalance) {
                    userBalance -= amount;
                    updateScreen(`Withdrawn: $${amount}\nNew balance: $${userBalance}`);
                    document.getElementById("amount").value = "";
                } else {
                    updateScreen("Invalid amount or insufficient funds");
                }
            };
        }

        function deposit() {
            document.getElementById("amount").style.display = "block";
            document.getElementById("amount").placeholder = "Enter amount to deposit";
            document.getElementById("depositBtn").textContent = "Confirm Deposit";
            document.getElementById("depositBtn").onclick = function() {
                const amount = parseInt(document.getElementById("amount").value);
                if (amount > 0) {
                    userBalance += amount;
                    updateScreen(`Deposited: $${amount}\nNew balance: $${userBalance}`);
                    document.getElementById("amount").value = "";
                } else {
                    updateScreen("Invalid amount");
                }
            };
        }

        function exitATM() {
            isAuthenticated = false;
            userBalance = 5000;
            document.getElementById("pin").value = "";
            document.getElementById("amount").value = "";
            document.getElementById("pin").style.display = "none";
            document.getElementById("amount").style.display = "none";
            document.getElementById("authBtn").style.display = "none";
            document.getElementById("balanceBtn").style.display = "none";
            document.getElementById("withdrawBtn").style.display = "none";
            document.getElementById("depositBtn").style.display = "none";
            document.getElementById("exitBtn").style.display = "none";
            document.getElementById("startBtn").style.display = "block";
            updateScreen("Thank you. Please take your card.");
        }
    </script>
</body>
</html>
